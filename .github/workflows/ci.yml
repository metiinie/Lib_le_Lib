name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: liblelib_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Lint
        working-directory: ./backend
        run: npm run lint

      - name: Build
        working-directory: ./backend
        run: npm run build

      - name: Unit Tests
        working-directory: ./backend
        run: npm run test

      - name: Export OpenAPI Spec
        working-directory: ./backend
        run: npm run export:openapi

      - name: E2E & Security Tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/liblelib_test
          JWT_SECRET: supersecretjwt
          JWT_REFRESH_SECRET: supersecretjwtrefresh
          WEBHOOK_SECRET: test_webhook_secret
          NODE_ENV: test
        run: npm run test:e2e
