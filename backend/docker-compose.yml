version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: lib-le-lib-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1832
      POSTGRES_DB: lib_le_lib
    ports:
      - '5555:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lib_le_lib"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
